[project]
name = "github-graphql"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Jonghyun Park", email = "parjong@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "gql[requests]>=4.0.0",
]

[project.scripts]
github-graphql = "github_graphql:main"

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.14.11",
]
