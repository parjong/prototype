on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          DST_ISSUE_NUMBER: 13
        run: uv run chat-from-github-issue
