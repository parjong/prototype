query ($number: Int!, $fldname: String!) { user(login: "parjong") {
  projectV2(number: $number) {
    field(name: $fldname) {
      __typename
      ...on ProjectV2SingleSelectField {
        id
        options { id, name }
      }
    }
  }
} }
